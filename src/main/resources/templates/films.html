<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<section th:fragment="content">
    <h2 class="mb-4">Кинотека</h2>
    <div class="alert alert-info" th:if="${films.isEmpty()}">
        Фильмы не найдены.
    </div>
    <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4" th:each="film : ${films}">
            <article class="card h-100">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${film.name}">Фильм</h5>
                    <p class="text-muted small mb-2">
                        <span th:text="${film.year}">2026</span>,
                        <span th:text="${film.genre}">Жанр</span>,
                        <span th:text="${film.durationInMinutes}">120</span> мин,
                        <span th:text="${film.minimalAge}">12</span>+
                    </p>
                    <p class="card-text" th:text="${film.description}">Описание</p>
                    <a class="btn btn-outline-primary mt-auto"
                       th:href="@{/films/{id}(id=${film.id})}">Подробнее</a>
                </div>
            </article>
        </div>
    </div>
</section>
</body>
</html>
