<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::content})}">
<body>
<section th:fragment="content">
    <div class="bg-white border rounded p-4 p-md-5">
        <h1 class="display-6 fw-bold mb-3">Cinema</h1>
        <p class="lead text-muted mb-4">
            Онлайн-покупка билетов в кинотеатр. Выберите фильм, сеанс, ряд и место,
            а билет будет забронирован сразу после оплаты.
        </p>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary btn-lg" th:href="@{/sessions}">Расписание</a>
            <a class="btn btn-outline-secondary btn-lg" th:href="@{/films}">Кинотека</a>
        </div>
    </div>
</section>
</body>
</html>
